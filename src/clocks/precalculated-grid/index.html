<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Precalculated Grid</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: black;
      }
      canvas {
        display: block;
      }
      #overlay {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <canvas id="glCanvas"></canvas>
    <div id="overlay">
      <svg width="100%" height="100%" viewBox="0 0 256 256">
        <circle cx="108" cy="122" r="2" fill="white"/>
        <circle cx="148" cy="122" r="2" fill="white"/>
        <circle cx="108" cy="134" r="2" fill="white"/>
        <circle cx="148" cy="134" r="2" fill="white"/>
      </svg>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
